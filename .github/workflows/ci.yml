name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: flowreview
          POSTGRES_PASSWORD: flowreview
          POSTGRES_DB: flowreview
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U flowreview"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # The whole pipeline runs with the deterministic fake AI provider — no key required.
      AI_PROVIDER: fake
      DATABASE_URL: postgresql://flowreview:flowreview@localhost:5432/flowreview?schema=public

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @flow-review/api db:generate

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests (domain, application, infrastructure, http, frontend)
        run: pnpm test

      - name: Apply migrations
        run: pnpm --filter @flow-review/api db:migrate

      - name: Integration tests (PostgreSQL)
        run: pnpm --filter @flow-review/api test:integration

      - name: Build
        run: pnpm build
